name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      # Backend integration tests (src/db_tests.rs) run against this; they skip
      # when DATABASE_URL is unset, so it is wired only for the test step below.
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: kowobau
          POSTGRES_DB: kowobau_test
          # Throwaway DB, network-isolated to this job and destroyed afterwards.
          # Trust auth keeps any password out of the workflow (no real secret).
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kowobau"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      # Keep every Rust source file reviewable: hard cap of 500 lines.
      - name: Line-count gate (max 500 lines per .rs file)
        run: |
          fail=0
          while IFS= read -r f; do
            n=$(wc -l < "$f")
            if [ "$n" -gt 500 ]; then
              echo "::error file=$f::$f has $n lines (max 500)"
              fail=1
            fi
          done < <(git ls-files '*.rs')
          exit $fail

      # Keep stylesheets reviewable: hard cap of 200 lines.
      - name: Line-count gate (max 200 lines per .css file)
        run: |
          fail=0
          while IFS= read -r f; do
            n=$(wc -l < "$f")
            if [ "$n" -gt 200 ]; then
              echo "::error file=$f::$f has $n lines (max 200)"
              fail=1
            fi
          done < <(git ls-files '*.css')
          exit $fail

      # Pinned toolchain: nursery lints change between releases and would
      # otherwise break CI on every rustup bump.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: clippy frontend (wasm target)
        run: cargo clippy -p kowobau-frontend --target wasm32-unknown-unknown -- -D warnings

      - name: tests
        env:
          DATABASE_URL: postgres://kowobau@localhost:5432/kowobau_test
        run: cargo test --workspace

      - name: trunk build + CSP externalizer
        run: |
          cargo install trunk --version 0.21.14 --locked
          cd crates/frontend
          trunk build --release --public-url /
          python3 externalize-init.py dist
          if grep -Eq '<script[^>]*>[^<]' dist/index.html; then
            echo '::error::dist/index.html still contains an inline script'
            exit 1
          fi
