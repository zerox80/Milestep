# Milestep external reverse proxy for Ubuntu 24.04 / 26.04.
#
# Put this file on the host, for example:
#   /etc/nginx/sites-available/milestep.conf
#   ln -s /etc/nginx/sites-available/milestep.conf /etc/nginx/sites-enabled/
#
# Requirements:
#   - NGINX 1.25+ built with ngx_http_v3_module.
#   - Check with: nginx -V 2>&1 | grep -o -- '--with-http_v3_module'
#   - TCP 80/443 and UDP 443 open in firewall/security group.
#   - Docker Compose publishes the internal Docker Nginx on 127.0.0.1:8080.
#   - Start Compose with: MILESTEP_HTTP_PORT=8080 docker compose up --build
#   - The normal Compose default remains localhost-only 127.0.0.1:80:80.
#
# Replace milestep.example.com and certificate paths before enabling.

# Brute-force protection for the unauthenticated auth endpoints (defense in
# depth on top of the same limit inside the Docker nginx).
map $uri $milestep_auth_edge_key {
    default "";
    /api/auth/login $binary_remote_addr;
    /api/auth/register $binary_remote_addr;
}
limit_req_zone $milestep_auth_edge_key zone=milestep_auth_edge:10m rate=10r/m;

upstream milestep_docker_nginx {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name milestep.example.com www.milestep.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;

    http2 on;
    http3 on;

    server_name milestep.example.com www.milestep.example.com;

    ssl_certificate /etc/letsencrypt/live/milestep.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/milestep.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/milestep.example.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    quic_retry on;
    quic_gso on;

    # NOTE: nginx add_header inheritance is all-or-nothing — if a location
    # below ever declares its own add_header, it must repeat all of these.
    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 50m;
    server_tokens off;

    location /api/auth/ {
        limit_req zone=milestep_auth_edge burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://milestep_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_buffering on;
    }

    # WebSocket endpoint for realtime updates (browsers use HTTP/1.1 for WS):
    # the Upgrade handshake must pass through, and the read timeout must
    # outlive the backend's 30s pings.
    location = /api/ws {
        proxy_pass http://milestep_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass http://milestep_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_buffering on;
        # The backend sets nosniff/CSP/X-Frame-Options/Referrer-Policy itself
        # and varies them per response (inline attachment previews must allow
        # same-origin framing). Declaring add_header here drops the inherited
        # server-level headers so the edge does not stack DENY on top; only
        # the headers the backend never sets are repeated.
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    location / {
        proxy_pass http://milestep_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_buffering on;
    }
}
