# Milestep internal vSphere reverse proxy with HTTP/3.
#
# Install on the VM as, for example:
#   /etc/nginx/sites-available/milestep.conf
#   ln -s /etc/nginx/sites-available/milestep.conf /etc/nginx/sites-enabled/
#
# Intended setup:
#   - Only reachable from the internal 192.168.1.0/24 LAN.
#   - Host Nginx terminates TLS with an internal/self-managed certificate.
#   - HTTP/3 uses QUIC on UDP 443, with HTTP/2 as TCP fallback.
#   - Docker Compose publishes the app's internal Nginx on 127.0.0.1:8080.
#   - Start Compose with: MILESTEP_HTTP_PORT=8080 docker compose up -d --build
#   - Verify HTTP/3 support with:
#       nginx -V 2>&1 | grep -o -- '--with-http_v3_module'
#
# Replace:
#   - 192.168.1.50 with the VM's static LAN IP.
#   - planner.example.test with your internal DNS name, or remove it if you only use IP.
#   - certificate paths with your real certificate files.
#
# Firewall note:
#   Open TCP 80, TCP 443 and UDP 443 from 192.168.1.0/24.

limit_req_zone $binary_remote_addr zone=milestep_auth_edge:10m rate=10r/m;

upstream milestep_docker_nginx {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 192.168.1.50:80;
    server_name planner.example.test 192.168.1.50;

    allow 192.168.1.0/24;
    deny all;

    return 301 https://$host$request_uri;
}

server {
    listen 192.168.1.50:443 ssl;
    listen 192.168.1.50:443 quic reuseport;

    http2 on;
    http3 on;

    server_name planner.example.test 192.168.1.50;

    allow 192.168.1.0/24;
    deny all;

    ssl_certificate /etc/nginx/certs/milestep/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/milestep/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    quic_retry on;

    client_max_body_size 50m;
    server_tokens off;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /api/auth/ {
        limit_req zone=milestep_auth_edge burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://milestep_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }

    # WebSocket endpoint for realtime updates (browsers use HTTP/1.1 for WS):
    # the Upgrade handshake must pass through, and the read timeout must
    # outlive the backend's 30s pings.
    location = /api/ws {
        proxy_pass http://milestep_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass http://milestep_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        # The backend sets nosniff/X-Frame-Options/Referrer-Policy itself and
        # varies them per response (inline attachment previews must allow
        # same-origin framing). Declaring add_header here drops the inherited
        # server-level headers so the edge does not stack DENY on top; only
        # the headers the backend never sets are repeated.
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    location / {
        proxy_pass http://milestep_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }
}
