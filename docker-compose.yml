services:
  app:
    build:
      context: .
      target: backend-runtime
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://kowobau:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/kowobau}
      KOWOBAU_SESSION_SECRET: ${KOWOBAU_SESSION_SECRET:?Set KOWOBAU_SESSION_SECRET in .env (at least 32 characters)}
      KOWOBAU_BIND: ${KOWOBAU_BIND:-0.0.0.0:8080}
      KOWOBAU_UPLOAD_DIR: ${KOWOBAU_UPLOAD_DIR:-/app/uploads}
      KOWOBAU_COOKIE_SECURE: ${KOWOBAU_COOKIE_SECURE:-false}
      KOWOBAU_SEED_DEMO: ${KOWOBAU_SEED_DEMO:-false}
      # The app is fronted by the Compose nginx, which sets X-Real-IP.
      KOWOBAU_TRUST_PROXY: "true"
      KOWOBAU_PUBLIC_ORIGIN: ${KOWOBAU_PUBLIC_ORIGIN:-}
    volumes:
      - uploads:/app/uploads
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kowobau-backend", "--healthcheck"]
      interval: 20s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      target: nginx-runtime
    ports:
      - "127.0.0.1:${KOWOBAU_HTTP_PORT:-80}:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:${KOWOBAU_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kowobau}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kowobau}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-kowobau} -d $${POSTGRES_DB:-kowobau}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  uploads:
