services:
  app:
    build:
      context: .
      target: backend-runtime
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://milestep:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/milestep}
      MILESTEP_SESSION_SECRET: ${MILESTEP_SESSION_SECRET:?Set MILESTEP_SESSION_SECRET in .env (at least 32 characters)}
      MILESTEP_BIND: ${MILESTEP_BIND:-0.0.0.0:8080}
      MILESTEP_UPLOAD_DIR: ${MILESTEP_UPLOAD_DIR:-/app/uploads}
      MILESTEP_COOKIE_SECURE: ${MILESTEP_COOKIE_SECURE:-false}
      MILESTEP_SEED_DEMO: ${MILESTEP_SEED_DEMO:-false}
      MILESTEP_REGISTRATION_ENABLED: ${MILESTEP_REGISTRATION_ENABLED:-true}
      MILESTEP_MAX_WORKSPACE_STORAGE_BYTES: ${MILESTEP_MAX_WORKSPACE_STORAGE_BYTES:-2147483648}
      # The app is fronted by the Compose nginx, which sets X-Real-IP. Trust
      # that header only from the dedicated `edge` network nginx shares with the
      # app — not the whole RFC 1918 space — so a sibling container (postgres)
      # or a future service on another network cannot spoof X-Real-IP to forge a
      # source IP and slip past the auth rate limit. Keep this in sync with the
      # `edge` subnet defined at the bottom of this file.
      MILESTEP_TRUST_PROXY: "true"
      MILESTEP_TRUSTED_PROXIES: "${MILESTEP_TRUSTED_PROXIES:-172.30.0.0/24}"
      MILESTEP_PUBLIC_ORIGIN: ${MILESTEP_PUBLIC_ORIGIN:-}
    networks:
      - edge
      - data
    volumes:
      - uploads:/app/uploads
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "milestep-backend", "--healthcheck"]
      interval: 20s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      target: nginx-runtime
    networks:
      - edge
    ports:
      - "127.0.0.1:${MILESTEP_HTTP_PORT:-80}:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    networks:
      - data
    ports:
      - "127.0.0.1:${MILESTEP_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-milestep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-milestep}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-milestep} -d $${POSTGRES_DB:-milestep}"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  # nginx <-> app only. Pinned subnet so the app can trust X-Real-IP from
  # exactly this range (see MILESTEP_TRUSTED_PROXIES above). Change the subnet
  # here and in MILESTEP_TRUSTED_PROXIES together if it collides with an existing
  # Docker network on the host.
  edge:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
  # app <-> postgres only; deliberately separate so postgres is never inside the
  # trusted-proxy range and cannot forge X-Real-IP.
  data:
    driver: bridge

volumes:
  postgres-data:
  uploads:
